# Security automation pipeline: SAST (Bandit) + DAST (OWASP ZAP baseline).
# Runs on every push and pull request so findings surface like unit test failures.

name: Security pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  # Flask listens on all interfaces; health checks use 127.0.0.1 from the runner.
  FLASK_APP: app.vulnerable_app:app
  # zaproxy/action-baseline runs Docker with --network=host, so the scan shares the runner's
  # loopback. Use 127.0.0.1 (not host.docker.internal — it is not resolvable in that mode).
  DAST_TARGET_URL: http://127.0.0.1:5000

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Start Flask (DAST target)
        run: |
          flask run --host=0.0.0.0 --port=5000 &
          for i in $(seq 1 30); do
            if curl -sSf "http://127.0.0.1:5000/" >/dev/null; then
              echo "Flask is up"
              exit 0
            fi
            sleep 1
          done
          echo "Flask failed to start"
          exit 1

      - name: Run Bandit (SAST)
        continue-on-error: true
        run: |
          bandit -r app -f json -o reports/bandit-report.json

      - name: Ensure Bandit JSON exists
        run: |
          if [ ! -s reports/bandit-report.json ]; then
            echo '{"results":[],"errors":[]}' > reports/bandit-report.json
          fi

      # ZAP writes reports as a non-root user inside Docker; avoid permission errors on the mount.
      - name: Ensure reports directory is writable for ZAP
        run: chmod -R a+rwx reports

      # The action always passes -J report_json.json (repo root) and verifies that file exists.
      # Do not add a second -J in cmd_options — it overrides the path and breaks the action.
      - name: OWASP ZAP Baseline scan (DAST)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.DAST_TARGET_URL }}
          # -I: do not fail the baseline script on WARN-level alerts.
          cmd_options: "-I"
          allow_issue_writing: false
          fail_action: false

      - name: Stage ZAP JSON for parser
        run: |
          if [ -f report_json.json ]; then
            cp report_json.json reports/zap-report.json
          else
            echo '{"site":[]}' > reports/zap-report.json
          fi

      - name: Merge tool output (unified JSON)
        run: |
          python scripts/vuln_parser.py \
            --bandit reports/bandit-report.json \
            --zap-json reports/zap-report.json \
            -o reports/unified_findings.json

      - name: Write Markdown summary vs baseline
        run: |
          python scripts/vuln_tracker.py \
            --findings reports/unified_findings.json \
            --baseline known_issues.json \
            -o reports/vuln_report.md

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            reports/bandit-report.json
            reports/zap-report.json
            reports/unified_findings.json
            reports/vuln_report.md
